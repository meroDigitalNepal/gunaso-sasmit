name: Deploy Gunaso App

on:
  repository_dispatch:
    types: [rep-deploy]
  workflow_dispatch:
    inputs:
      rep:
        description: 'Representative name (matches a GitHub Environment)'
        required: true
      repo:
        description: 'Source repo owner/name (defaults to this repo)'
        required: false
      sha:
        description: 'Commit SHA to deploy (defaults to latest on this repo)'
        required: false

jobs:
  # ---------------------------------------------------------------------------
  # Resolve which Representative this run is for, and which commit/repo to
  # build.
  #
  # - repository_dispatch (a Representative's fork): sent by their fork via
  #   fork-notify-deploy.yml, carrying their own rep/repo/sha.
  # - workflow_dispatch (manual, maintainer-triggered): for one-off/testing
  #   deploys; repo/sha default to this repo's latest commit if left blank.
  #
  # `rep` is used as the GitHub Environment name, so each job pulls secrets
  # from the matching environment. `repo`/`sha` tell the checkout step where
  # the code actually lives — a Representative's fork for dispatch, or
  # whatever was specified (or defaulted) for a manual run.
  # ---------------------------------------------------------------------------
  resolve-env:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      rep: ${{ steps.extract.outputs.rep }}
      repo: ${{ steps.extract.outputs.repo }}
      sha: ${{ steps.extract.outputs.sha }}
    steps:
      - name: Extract representative name, source repo, and commit
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            rep="${{ github.event.client_payload.rep }}"
            repo="${{ github.event.client_payload.repo }}"
            sha="${{ github.event.client_payload.sha }}"
          else
            rep="${{ inputs.rep }}"
            repo="${{ inputs.repo }}"
            sha="${{ inputs.sha }}"
            repo="${repo:-${{ github.repository }}}"
            sha="${sha:-${{ github.sha }}}"
          fi
          echo "rep=$rep" >> "$GITHUB_OUTPUT"
          echo "repo=$repo" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Build a multi-stage Docker image (frontend + server), run migrations,
  # deploy to Azure Container Apps.
  #
  # The React frontend is baked into the image at build time — VITE_* vars are
  # passed as Docker build args and bundled into the JS at that point.
  # The server then serves the SPA at /gunaso and the API at /gunaso/api.
  #
  # Repo-level secrets:  AZURE_CLIENT_ID, AZURE_CLIENT_SECRET,
  #                      AZURE_SUBSCRIPTION_ID, AZURE_TENANT_ID,
  #                      ACR_LOGIN_SERVER, ACR_USERNAME, ACR_PASSWORD,
  #                      AZURE_RESOURCE_GROUP, DATABASE_URL,
  #                      ENTRA_CLIENT_ID, VITE_ENTRA_AUTHORITY,
  #                      VITE_ENTRA_API_SCOPE, VITE_TURNSTILE_SITE_KEY
  # Environment secrets: AZURE_CONTAINER_APP_NAME
  #
  # All other Container App env vars (PARLIAMENTARIAN_ID, CORS_ORIGIN,
  # ENTRA_TENANT_ID, NODE_ENV, PORT) are set once at Container App creation
  # and are NOT re-set on each deploy — only the image is updated here.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy (${{ needs.resolve-env.outputs.rep }})
    needs: resolve-env
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.rep }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.resolve-env.outputs.repo }}
          ref: ${{ needs.resolve-env.outputs.sha }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: >-
            {
              "clientId":       "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":   "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId":       "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/gunaso-${{ needs.resolve-env.outputs.rep }}:${{ needs.resolve-env.outputs.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/gunaso-${{ needs.resolve-env.outputs.rep }}:latest
          build-args: |
            VITE_ENTRA_CLIENT_ID=${{ secrets.ENTRA_CLIENT_ID }}
            VITE_ENTRA_AUTHORITY=${{ secrets.VITE_ENTRA_AUTHORITY }}
            VITE_ENTRA_API_SCOPE=${{ secrets.VITE_ENTRA_API_SCOPE }}
            VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY }}

      - name: Setup Node.js for migrations
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci --omit=dev

      - name: Run database migrations
        working-directory: server
        run: node migrate.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production

      - name: Deploy to Azure Container Apps
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ secrets.ACR_LOGIN_SERVER }}/gunaso-${{ needs.resolve-env.outputs.rep }}:${{ needs.resolve-env.outputs.sha }}
