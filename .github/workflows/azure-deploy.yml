name: Deploy MP App

on:
  push:
    branches:
      - 'mp/**'
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Extract the MP name from the branch name.
  # mp/sasmit  →  sasmit
  # This name is used as the GitHub Environment, so each job pulls secrets
  # from the matching environment.
  # ---------------------------------------------------------------------------
  resolve-env:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      mp: ${{ steps.extract.outputs.mp }}
    steps:
      - name: Extract MP name from branch
        id: extract
        run: echo "mp=${GITHUB_REF_NAME#mp/}" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Build a multi-stage Docker image (frontend + server), run migrations,
  # deploy to Azure Container Apps.
  #
  # The React frontend is baked into the image at build time — VITE_* vars are
  # passed as Docker build args and bundled into the JS at that point.
  # The server then serves the SPA at /gunaso and the API at /gunaso/api.
  #
  # Repo-level secrets:  AZURE_CLIENT_ID, AZURE_CLIENT_SECRET,
  #                      AZURE_SUBSCRIPTION_ID, AZURE_TENANT_ID,
  #                      ACR_LOGIN_SERVER, ACR_USERNAME, ACR_PASSWORD,
  #                      AZURE_RESOURCE_GROUP, DATABASE_URL,
  #                      ENTRA_CLIENT_ID, VITE_ENTRA_AUTHORITY,
  #                      VITE_ENTRA_API_SCOPE, VITE_TURNSTILE_SITE_KEY
  # Environment secrets: AZURE_CONTAINER_APP_NAME
  #
  # All other Container App env vars (PARLIAMENTARIAN_ID, CORS_ORIGIN,
  # ENTRA_TENANT_ID, NODE_ENV, PORT) are set once at Container App creation
  # and are NOT re-set on each deploy — only the image is updated here.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy (${{ needs.resolve-env.outputs.mp }})
    needs: resolve-env
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.mp }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: >-
            {
              "clientId":       "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":   "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId":       "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/gunaso-${{ needs.resolve-env.outputs.mp }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/gunaso-${{ needs.resolve-env.outputs.mp }}:latest
          build-args: |
            VITE_ENTRA_CLIENT_ID=${{ secrets.ENTRA_CLIENT_ID }}
            VITE_ENTRA_AUTHORITY=${{ secrets.VITE_ENTRA_AUTHORITY }}
            VITE_ENTRA_API_SCOPE=${{ secrets.VITE_ENTRA_API_SCOPE }}
            VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY }}

      - name: Setup Node.js for migrations
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci --omit=dev

      - name: Run database migrations
        working-directory: server
        run: node migrate.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production

      - name: Deploy to Azure Container Apps
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ secrets.ACR_LOGIN_SERVER }}/gunaso-${{ needs.resolve-env.outputs.mp }}:${{ github.sha }}
